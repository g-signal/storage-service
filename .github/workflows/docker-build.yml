name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0  # 获取完整 git 历史和标签

      - name: Set up JDK 21
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'maven'

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Create config directory and properties
        run: |
          mkdir -p config
          echo "docker.repo=${{ secrets.DOCKERHUB_USERNAME }}/storage-service" > config/staging-build.properties

      - name: Show version info for debugging
        run: |
          git describe --tags --dirty || echo "No tags found"
          ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout

      - name: Build and push with Jib
        run: |
          ./mvnw -e -B clean package jib:build \
            -Pdocker-deploy \
            -Denv=staging \
            -DskipTests
